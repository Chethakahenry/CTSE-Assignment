name: CI - Notification Service

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: notification-service

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------------
      # Setup Python
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd notification-service
          pip install -r requirements.txt

      # -----------------------------
      # Debug (optional but useful)
      # -----------------------------
      - name: Check SONAR_TOKEN exists
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "❌ SONAR_TOKEN is missing"
            exit 1
          else
            echo "✅ SONAR_TOKEN is set"
          fi

      # -----------------------------
      # SonarCloud Scan
      # -----------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: notification-service
          args: >
            -Dsonar.projectKey=KaviduMalshan99_Cloud-Based-Event-Management-System
            -Dsonar.organization=kavidumalshan99

      # -----------------------------
      # Docker Login
      # -----------------------------
      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # -----------------------------
      # Build Docker Image
      # -----------------------------
      - name: Build Docker Image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest ./notification-service

      # -----------------------------
      # Push Docker Image
      # -----------------------------
      - name: Push Docker Image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
